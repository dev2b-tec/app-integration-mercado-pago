name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    uses: dev2b-tec/core-cicd-templates/.github/workflows/docker-build.yml@main
    with:
      app_name: app-integration-mercado-pago
      dockerfile_path: Dockerfile
    secrets:
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

  deploy:
    needs: build
    uses: dev2b-tec/core-cicd-templates/.github/workflows/docker-deploy.yml@main
    with:
      app_name: app-integration-mercado-pago
      deploy_path: /opt/apps/app-integration-mercado-pago
    secrets:
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      APP_ENV: ${{ secrets.APP_ENV }}
